<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>InnoCORE Research Institution</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/home.css" />
</head>

<body class="home">

<header class="site-header">
  <a class="brand" href="./" aria-label="Go to Home">
    <span class="brand-text">InnoCORE Research Institution</span>
  </a>

  <nav class="site-nav">
    <a href="./">Home</a>
    <a href="project/">Project</a>
    <a href="member/">Member</a>
    <a href="contact/">Contact</a>
  </nav>
</header>

<section class="home-hero-dual">
  <div class="hero-grid">
    <figure class="hero-item hero-item-result">
      <img src="assets/img/main/main0.png" alt="CARE main visual" />
    </figure>

    <figure class="hero-item hero-item-poster">
      <img src="assets/img/main/poster.png" alt="CARE Fellowship poster" />
    </figure>
  </div>
</section>

<main class="home-page">
  <section class="home-section">
    <div class="section-head-row">
      <div>
        <h2>Highlights</h2>
      </div>
    </div>

    <div class="home-showcase-card">
      <div class="photo-slider">
        <button class="slider-btn prev" aria-label="Previous slide">‹</button>

        <div class="slider-viewport">
          <div class="slider-track">
            <img
              src="assets/img/main/main2.png"
              class="slider-image"
              alt="Highlight image 1"
            />

            <img
              src="assets/img/main/main3.png"
              class="slider-image"
              alt="Highlight image 2"
            />

            <img
              src="assets/img/main/main4.png"
              class="slider-image"
              alt="Highlight image 3"
            />
          </div>
        </div>

        <button class="slider-btn next" aria-label="Next slide">›</button>
      </div>

      <div class="slider-dots">
        <button class="dot active" aria-label="Go to slide 1"></button>
        <button class="dot" aria-label="Go to slide 2"></button>
        <button class="dot" aria-label="Go to slide 3"></button>
      </div>
    </div>
  </section>
</main>

<footer>
  © 2025 InnoCORE. All rights reserved.
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
